<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="610" viewBox="0 0 1120 610" role="img" aria-labelledby="title desc">
  <title id="title">Aurel CI score gate output</title>
  <desc id="desc">A terminal screenshot showing a JSON score gate command and threshold failure message.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .window-title { fill: #cbd5e1; font: 14px Consolas, "Courier New", monospace; }
      .prompt { fill: #38bdf8; font: 19px Consolas, "Courier New", monospace; }
      .command { fill: #f8fafc; }
      .json { fill: #cbd5e1; font: 19px Consolas, "Courier New", monospace; }
      .key { fill: #93c5fd; }
      .value { fill: #86efac; }
      .error { fill: #fca5a5; font: 19px Consolas, "Courier New", monospace; }
    </style>
  </defs>
  <rect width="1120" height="610" fill="#f6f8fb"/>
  <rect x="40" y="32" width="1040" height="546" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <path d="M48 32h1024a8 8 0 0 1 8 8v34H40V40a8 8 0 0 1 8-8z" fill="#111827"/>
  <circle cx="70" cy="53" r="7" fill="#f87171"/>
  <circle cx="94" cy="53" r="7" fill="#fbbf24"/>
  <circle cx="118" cy="53" r="7" fill="#34d399"/>
  <text x="560" y="59" text-anchor="middle" class="window-title">GitHub Actions log - contributor readiness gate</text>

  <text x="72" y="120" class="prompt">$ <tspan class="command">aurel https://github.com/owner/repo --format json --min-score 80</tspan></text>
  <text x="72" y="174" class="json">{</text>
  <text x="96" y="206" class="json"><tspan class="key">"schema_version"</tspan>: <tspan class="value">"1.0"</tspan>,</text>
  <text x="96" y="238" class="json"><tspan class="key">"repository"</tspan>: { <tspan class="key">"display_name"</tspan>: <tspan class="value">"github:owner/repo"</tspan> },</text>
  <text x="96" y="270" class="json"><tspan class="key">"score"</tspan>: {</text>
  <text x="120" y="302" class="json"><tspan class="key">"value"</tspan>: 58,</text>
  <text x="120" y="334" class="json"><tspan class="key">"label"</tspan>: <tspan class="value">"Needs improvement"</tspan></text>
  <text x="96" y="366" class="json">},</text>
  <text x="96" y="398" class="json"><tspan class="key">"recommendations"</tspan>: [ ... ]</text>
  <text x="72" y="430" class="json">}</text>
  <text x="72" y="500" class="error">Error: Score 58 is below required minimum 80.</text>
  <text x="72" y="532" class="error">Process completed with exit code 3.</text>
</svg>
