<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="690" viewBox="0 0 1120 690" role="img" aria-labelledby="title desc">
  <title id="title">Aurel config file example</title>
  <desc id="desc">An editor screenshot showing a compact aurel.yml configuration file.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .window-title { fill: #cbd5e1; font: 14px Consolas, "Courier New", monospace; }
      .line { fill: #64748b; font: 18px Consolas, "Courier New", monospace; }
      .key { fill: #93c5fd; font: 20px Consolas, "Courier New", monospace; }
      .value { fill: #86efac; font: 20px Consolas, "Courier New", monospace; }
      .text { fill: #cbd5e1; font: 20px Consolas, "Courier New", monospace; }
    </style>
  </defs>
  <rect width="1120" height="690" fill="#f6f8fb"/>
  <rect x="40" y="32" width="1040" height="626" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <path d="M48 32h1024a8 8 0 0 1 8 8v34H40V40a8 8 0 0 1 8-8z" fill="#111827"/>
  <circle cx="70" cy="53" r="7" fill="#f87171"/>
  <circle cx="94" cy="53" r="7" fill="#fbbf24"/>
  <circle cx="118" cy="53" r="7" fill="#34d399"/>
  <text x="560" y="59" text-anchor="middle" class="window-title">aurel.yml</text>

  <text x="76" y="120" class="line">1</text><text x="126" y="120" class="key">project_type</text><text x="266" y="120" class="text">: </text><text x="286" y="120" class="value">documentation</text>
  <text x="76" y="154" class="line">2</text><text x="126" y="154" class="key">audience</text><text x="226" y="154" class="text">: </text><text x="246" y="154" class="value">students</text>
  <text x="76" y="188" class="line">3</text><text x="126" y="188" class="key">preset</text><text x="206" y="188" class="text">: </text><text x="226" y="188" class="value">classroom</text>
  <text x="76" y="246" class="line">4</text><text x="126" y="246" class="key">checks</text><text x="206" y="246" class="text">:</text>
  <text x="76" y="280" class="line">5</text><text x="154" y="280" class="key">readme_paths</text><text x="294" y="280" class="text">:</text>
  <text x="76" y="314" class="line">6</text><text x="182" y="314" class="text">- </text><text x="206" y="314" class="value">README.md</text>
  <text x="76" y="348" class="line">7</text><text x="182" y="348" class="text">- </text><text x="206" y="348" class="value">docs/index.md</text>
  <text x="76" y="382" class="line">8</text><text x="154" y="382" class="key">require_contributing</text><text x="394" y="382" class="text">: </text><text x="414" y="382" class="value">true</text>
  <text x="76" y="416" class="line">9</text><text x="154" y="416" class="key">require_security</text><text x="354" y="416" class="text">: </text><text x="374" y="416" class="value">false</text>
  <text x="62" y="450" class="line">10</text><text x="154" y="450" class="key">beginner_labels</text><text x="334" y="450" class="text">:</text>
  <text x="62" y="484" class="line">11</text><text x="182" y="484" class="text">- </text><text x="206" y="484" class="value">good first issue</text>
  <text x="62" y="518" class="line">12</text><text x="182" y="518" class="text">- </text><text x="206" y="518" class="value">help wanted</text>
  <text x="62" y="576" class="line">13</text><text x="126" y="576" class="key">command_checks</text><text x="286" y="576" class="text">: </text><text x="306" y="576" class="text">[</text><text x="326" y="576" class="value">install</text><text x="406" y="576" class="text">, </text><text x="426" y="576" class="value">run</text><text x="466" y="576" class="text">, </text><text x="486" y="576" class="value">test</text><text x="536" y="576" class="text">, </text><text x="556" y="576" class="value">lint</text><text x="606" y="576" class="text">]</text>
</svg>
