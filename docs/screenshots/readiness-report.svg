<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Aurel contributor readiness report in a terminal</title>
  <desc id="desc">A terminal screenshot showing a contributor readiness score, score categories, top fixes, and Starter PR Kit.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .window-title { fill: #cbd5e1; font: 14px Consolas, "Courier New", monospace; }
      .prompt { fill: #38bdf8; font: 18px Consolas, "Courier New", monospace; }
      .command { fill: #f8fafc; }
      .text { fill: #cbd5e1; font: 18px Consolas, "Courier New", monospace; }
      .heading { fill: #facc15; font: 18px Consolas, "Courier New", monospace; }
      .score { fill: #86efac; font: 18px Consolas, "Courier New", monospace; }
      .warning { fill: #fdba74; font: 18px Consolas, "Courier New", monospace; }
      .muted { fill: #94a3b8; font: 18px Consolas, "Courier New", monospace; }
    </style>
  </defs>
  <rect width="1120" height="760" fill="#f6f8fb"/>
  <rect x="40" y="32" width="1040" height="696" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <path d="M48 32h1024a8 8 0 0 1 8 8v34H40V40a8 8 0 0 1 8-8z" fill="#111827"/>
  <circle cx="70" cy="53" r="7" fill="#f87171"/>
  <circle cx="94" cy="53" r="7" fill="#fbbf24"/>
  <circle cx="118" cy="53" r="7" fill="#34d399"/>
  <text x="560" y="59" text-anchor="middle" class="window-title">PowerShell - aurel repository analysis</text>

  <text x="72" y="112" class="prompt">PS C:\projects\aurel&gt; <tspan class="command">aurel https://github.com/owner/repo</tspan></text>
  <text x="72" y="158" class="text">
    <tspan x="72" dy="0">Repository: github:owner/repo</tspan>
    <tspan x="72" dy="28">Detected Profile: Python project (Medium confidence)</tspan>
  </text>

  <text x="72" y="246" class="score">Contributor Readiness Score: 58/100 (58%)</text>
  <text x="72" y="280" class="warning">Label: Needs improvement</text>
  <text x="72" y="314" class="muted">Applied Score Cap: 75 (No contribution workflow guidance was detected.)</text>

  <text x="72" y="378" class="heading">Score Categories:</text>
  <text x="94" y="414" class="text">
    <tspan x="94" dy="0">- Documentation Quality: 25/25</tspan>
    <tspan x="94" dy="28">- Contributor Workflow: 0/25</tspan>
    <tspan x="94" dy="28">- Setup &amp; Testing Clarity: 20/20</tspan>
    <tspan x="94" dy="28">- Issue Readiness: 8/15</tspan>
    <tspan x="94" dy="28">- Community &amp; Safety: 5/15</tspan>
  </text>

  <text x="580" y="378" class="heading">Top Fixes To Reach 90:</text>
  <text x="602" y="414" class="text">
    <tspan x="602" dy="0">- [High, +20] Add contribution guide</tspan>
    <tspan x="602" dy="28">- [Medium, +15] Add security reporting</tspan>
    <tspan x="602" dy="28">  instructions</tspan>
  </text>

  <text x="72" y="596" class="heading">Starter PR Kit:</text>
  <text x="94" y="632" class="text">
    <tspan x="94" dy="0">Recommended First Contribution: Add contributor instructions with setup,</tspan>
    <tspan x="94" dy="28">branch naming, testing steps, and pull request guidelines.</tspan>
    <tspan x="94" dy="28">Confidence: High</tspan>
  </text>
</svg>
