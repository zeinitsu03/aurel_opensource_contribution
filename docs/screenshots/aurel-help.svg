<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">Aurel help command in a terminal</title>
  <desc id="desc">A terminal screenshot showing the aurel help output and main CLI options.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .window-title { fill: #cbd5e1; font: 14px Consolas, "Courier New", monospace; }
      .prompt { fill: #38bdf8; font: 20px Consolas, "Courier New", monospace; }
      .command { fill: #f8fafc; }
      .heading { fill: #facc15; font: 20px Consolas, "Courier New", monospace; }
      .text { fill: #cbd5e1; font: 19px Consolas, "Courier New", monospace; }
      .option { fill: #86efac; font: 19px Consolas, "Courier New", monospace; }
    </style>
  </defs>
  <rect width="1120" height="660" fill="#f6f8fb"/>
  <rect x="40" y="32" width="1040" height="596" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <path d="M48 32h1024a8 8 0 0 1 8 8v34H40V40a8 8 0 0 1 8-8z" fill="#111827"/>
  <circle cx="70" cy="53" r="7" fill="#f87171"/>
  <circle cx="94" cy="53" r="7" fill="#fbbf24"/>
  <circle cx="118" cy="53" r="7" fill="#34d399"/>
  <text x="560" y="59" text-anchor="middle" class="window-title">PowerShell - aurel --help</text>

  <text x="72" y="116" class="prompt">PS C:\projects\aurel&gt; <tspan class="command">aurel --help</tspan></text>
  <text x="72" y="166" class="heading">usage: aurel [-h] [-o OUTPUT] [--format {terminal,text,markdown,json,html}]</text>
  <text x="72" y="196" class="heading">             [--compare COMPARE] [--min-score MIN_SCORE]</text>
  <text x="72" y="226" class="heading">             [--config CONFIG] [--github-token GITHUB_TOKEN]</text>
  <text x="72" y="256" class="heading">             [repository_url]</text>

  <text x="72" y="322" class="text">Analyze whether a remote repository is ready for contributors.</text>
  <text x="72" y="380" class="option">positional arguments:</text>
  <text x="96" y="414" class="text">repository_url     GitHub, GitLab, or Bitbucket repository URL</text>

  <text x="72" y="472" class="option">options:</text>
  <text x="96" y="506" class="text">-o, --output       Write a report to a local path</text>
  <text x="96" y="536" class="text">--format           terminal, text, markdown, json, or html</text>
  <text x="96" y="566" class="text">--min-score        Exit non-zero below a readiness threshold</text>
  <text x="96" y="596" class="text">--config           Load project-specific aurel.yml rules</text>
</svg>
