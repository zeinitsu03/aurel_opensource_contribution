<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">Aurel extension workflow</title>
  <desc id="desc">A terminal-style screenshot showing where to edit code and tests for common Aurel extension work.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .window-title { fill: #cbd5e1; font: 14px Consolas, "Courier New", monospace; }
      .heading { fill: #facc15; font: 21px Consolas, "Courier New", monospace; }
      .text { fill: #cbd5e1; font: 19px Consolas, "Courier New", monospace; }
      .path { fill: #86efac; font: 19px Consolas, "Courier New", monospace; }
      .arrow { fill: #38bdf8; font: 19px Consolas, "Courier New", monospace; }
    </style>
  </defs>
  <rect width="1120" height="700" fill="#f6f8fb"/>
  <rect x="40" y="32" width="1040" height="636" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <path d="M48 32h1024a8 8 0 0 1 8 8v34H40V40a8 8 0 0 1 8-8z" fill="#111827"/>
  <circle cx="70" cy="53" r="7" fill="#f87171"/>
  <circle cx="94" cy="53" r="7" fill="#fbbf24"/>
  <circle cx="118" cy="53" r="7" fill="#34d399"/>
  <text x="560" y="59" text-anchor="middle" class="window-title">Extending Aurel</text>

  <text x="72" y="122" class="heading">Common change paths</text>
  <text x="96" y="176" class="text">Add a provider</text>
  <text x="350" y="176" class="arrow">-&gt;</text>
  <text x="400" y="176" class="path">aurel/parser.py</text>
  <text x="616" y="176" class="arrow">+</text>
  <text x="652" y="176" class="path">aurel/providers.py</text>
  <text x="96" y="224" class="text">Add a profile</text>
  <text x="350" y="224" class="arrow">-&gt;</text>
  <text x="400" y="224" class="path">aurel/profiles.py</text>
  <text x="616" y="224" class="arrow">+</text>
  <text x="652" y="224" class="path">tests/test_profiles.py</text>
  <text x="96" y="272" class="text">Add a readiness check</text>
  <text x="350" y="272" class="arrow">-&gt;</text>
  <text x="400" y="272" class="path">aurel/checks.py</text>
  <text x="616" y="272" class="arrow">+</text>
  <text x="652" y="272" class="path">aurel/scorer.py</text>
  <text x="96" y="320" class="text">Improve recommendations</text>
  <text x="350" y="320" class="arrow">-&gt;</text>
  <text x="400" y="320" class="path">aurel/advisor.py</text>
  <text x="616" y="320" class="arrow">+</text>
  <text x="652" y="320" class="path">tests/test_advisor.py</text>
  <text x="96" y="368" class="text">Change reports</text>
  <text x="350" y="368" class="arrow">-&gt;</text>
  <text x="400" y="368" class="path">aurel/report.py</text>
  <text x="616" y="368" class="arrow">+</text>
  <text x="652" y="368" class="path">examples/sample_report.md</text>

  <text x="72" y="458" class="heading">Always finish with</text>
  <text x="96" y="512" class="path">python -m pytest</text>
  <text x="96" y="560" class="path">aurel --help</text>
  <text x="96" y="608" class="path">aurel https://github.com/owner/repo --format json</text>
</svg>
