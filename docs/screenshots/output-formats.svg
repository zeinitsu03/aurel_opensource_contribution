<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">Aurel output format commands</title>
  <desc id="desc">A terminal screenshot showing commands for text, Markdown, JSON, and HTML report output.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .window-title { fill: #cbd5e1; font: 14px Consolas, "Courier New", monospace; }
      .prompt { fill: #38bdf8; font: 19px Consolas, "Courier New", monospace; }
      .command { fill: #f8fafc; }
      .success { fill: #86efac; font: 19px Consolas, "Courier New", monospace; }
      .muted { fill: #94a3b8; font: 18px Consolas, "Courier New", monospace; }
    </style>
  </defs>
  <rect width="1120" height="650" fill="#f6f8fb"/>
  <rect x="40" y="32" width="1040" height="586" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <path d="M48 32h1024a8 8 0 0 1 8 8v34H40V40a8 8 0 0 1 8-8z" fill="#111827"/>
  <circle cx="70" cy="53" r="7" fill="#f87171"/>
  <circle cx="94" cy="53" r="7" fill="#fbbf24"/>
  <circle cx="118" cy="53" r="7" fill="#34d399"/>
  <text x="560" y="59" text-anchor="middle" class="window-title">PowerShell - report formats</text>

  <text x="72" y="120" class="prompt">PS C:\projects\aurel&gt; <tspan class="command">aurel https://github.com/owner/repo --output reports/readiness.txt</tspan></text>
  <text x="96" y="154" class="success">Text report written to reports/readiness.txt</text>
  <text x="96" y="188" class="muted">Good for sharing a plain report with maintainers.</text>

  <text x="72" y="256" class="prompt">PS C:\projects\aurel&gt; <tspan class="command">aurel https://github.com/owner/repo --output reports/readiness.md</tspan></text>
  <text x="96" y="290" class="success">Markdown report written to reports/readiness.md</text>
  <text x="96" y="324" class="muted">Good for issues, pull requests, and docs.</text>

  <text x="72" y="392" class="prompt">PS C:\projects\aurel&gt; <tspan class="command">aurel https://github.com/owner/repo --format json --output reports/aurel.json</tspan></text>
  <text x="96" y="426" class="success">Json report written to reports/aurel.json</text>
  <text x="96" y="460" class="muted">Good for CI gates, dashboards, and comparisons.</text>

  <text x="72" y="528" class="prompt">PS C:\projects\aurel&gt; <tspan class="command">aurel https://github.com/owner/repo --format html --output reports/readiness.html</tspan></text>
  <text x="96" y="562" class="success">Html report written to reports/readiness.html</text>
  <text x="96" y="596" class="muted">Good for a lightweight local browser view.</text>
</svg>
